<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم الحجز</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .box {
      background: white;
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      text-align: center;
    }

    .success-icon {
      font-size: 60px;
      margin-bottom: 16px;
    }

    .success-title {
      font-size: 22px;
      font-weight: bold;
      color: #155724;
      margin-bottom: 20px;
    }

    .success-msg {
      font-size: 15px;
      color: #333;
      line-height: 1.8;
      background: #d4edda;
      border: 1px solid #c3e6cb;
      border-radius: 12px;
      padding: 20px;
    }

    .back-btn {
      display: inline-block;
      margin-top: 24px;
      background: #1a1a2e;
      color: white;
      border-radius: 12px;
      padding: 12px 30px;
      font-size: 15px;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.2s;
    }

    .back-btn:hover { background: #2d2d4e; }
  </style>
</head>
<body>

<div class="box">
  <div class="success-icon">✅</div>
  <div class="success-title">تم الحجز بنجاح!</div>
  <div class="success-msg" id="msg">جاري التحميل...</div>
  <a href="index.html" class="back-btn">العودة للإعلان</a>
</div>

    ⚠️ سيتم إلغاء حجزك تلقائياً إن لم يتم الدفع في الموعد

</body>
</html>
