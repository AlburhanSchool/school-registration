<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <style>
  @font-face {
    font-family: 'Careem';
    src: url('Careem Bold.ttf') format('truetype');
    font-weight: bold;
  }
</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التسجيل المبكر</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
  font-family: 'Careem', sans-serif;
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  height: 100dvh;
  overflow: hidden;
}

.poster-wrapper {
  position: relative;
  width: 100%;
  max-width: 430px;
  height: 100dvh;
  overflow: hidden;
}

.poster-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  display: block;
}

    /* ===== العداد فوق رقم 20 ===== */
    .counter-box {
  position: absolute;
  top: 42%;
  right: 8%;
  width: 44%;
  text-align: center;
}
    
    .slots-number {
      font-size: 85px;
      font-weight: 900;
      color: #e8275a;
      line-height: 1;
    }

    .slots-label {
  font-size: 17px;
  color: #2d5f7a;
  font-weight: 700;
  border-radius: 20px;
  padding: 3px 8px;
  margin-top: 19px;
  display: inline-block;
}


    /* ===== زر التسجيل ===== */
    .register-btn-container {
  position: absolute;
  bottom: 10%;
  right: 4%;
  width: 42%;
  text-align: center;
}

.register-btn {
  background: #f9be34;
  color: #2d5f7a;
  border: none;
  border-radius: 50px;
  width: auto;
  padding: 10px 20px;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
  transition: transform 0.2s;
  font-family: inherit;
  text-decoration: none;
  display: inline-block;
}

    .register-btn:hover { transform: scale(1.03); }

    .full-notice {
      background: rgba(255,0,0,0.85);
      color: white;
      border-radius: 50px;
      padding: 14px 0;
      width: 100%;
      font-size: 18px;
      font-weight: bold;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="poster-wrapper">
  <img src="poster.jpg" alt="إعلان التسجيل">

  <!-- العداد -->
    <div class="counter-box">
    <div class="slots-number" id="slotsCount">--</div>
    <div class="slots-label">مقعد من أصل 20</div>
  </div>

  <!-- زر التسجيل -->
  <div class="register-btn-container">
    <a href="form.html" class="register-btn" id="registerBtn">
      انقر هنا للتسجيل 
    </a>
    <div class="full-notice" id="fullNotice">
      🎉 امتلأت المقاعد!
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxhzjjTu-4f2qE-Ob3bZchVY4WRnXElu3fH9qD0u4nCKMLWoecKgY8f43rhSWXh4XHrwA/exec';

  function updateSlots() {
    const script = document.createElement('script');
    window.handleSlots = function(data) {
      document.getElementById('slotsCount').textContent = data.availableSlots;
      if (data.availableSlots <= 0) {
        document.getElementById('registerBtn').style.display = 'none';
        document.getElementById('fullNotice').style.display = 'block';
      }
    };
    script.src = SCRIPT_URL + '?action=getSlots&callback=handleSlots';
    document.body.appendChild(script);
  }

  updateSlots();
  setInterval(updateSlots, 30000);
</script>

</body>
</html>
